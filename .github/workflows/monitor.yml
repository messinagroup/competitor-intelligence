name: Run Tusk Monitors

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-monitors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Tusk Team Monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python tusk_team_monitor.py

      - name: Run BPI Alerts Monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python bpi_alerts_monitor.py
