name: Run Tusk Monitors

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: pip install playwright && playwright install chromium

      - name: Run Tusk Team Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 tusk_team_monitor.py

      - name: Run Tusk Careers Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 tusk_careers_monitor.py

      - name: Run Tusk News Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 tusk_news_monitor.py

      - name: Run Tusk Services Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 tusk_services_monitor.py

      - name: Run Teneo Services Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 teneo_services_monitor.py

      - name: Run Teneo Leadership Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        # run: python3 teneo_leadership_monitor.py

      - name: Run Teneo News Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 teneo_news_monitor.py

      - name: Run Teneo Jobs Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 teneo_jobs_monitor.py

      - name: Run FGS Leadership Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 fgs_leadership_monitor.py

      - name: Run BPI Alerts Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 bpi_alerts_monitor.py

      - name: Commit updated state files
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add *.json
          git diff --staged --quiet || git commit -m "Update monitor state files"
          git push

      - name: Run FGS Careers Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 fgs_careers_monitor.py

      - name: Run FGS AI Newsletter Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 fgs_ai_newsletter_monitor.py

      - name: Run Google Alerts Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 google_alerts_monitor.py

      - name: Run FGS Services Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 fgs_services_monitor.py

      - name: Run FGS News Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 fgs_news_monitor.py

      - name: Run Flint Services Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 flint_services_monitor.py
        continue-on-error: true
      - name: Capstone Leadership Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 capstone_leadership_monitor.py
      - name: Capstone Careers Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 capstone_careers_monitor.py
      - name: Capstone Case Studies Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 capstone_case_studies_monitor.py
      - name: Capstone News Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 capstone_news_monitor.py
