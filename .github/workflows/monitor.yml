name: Run Tusk Monitors

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Tusk Team Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 tusk_team_monitor.py

      - name: Run BPI Alerts Monitor
        env:
          LOVABLE_FUNCTION_URL: ${{ secrets.LOVABLE_FUNCTION_URL }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: python3 bpi_alerts_monitor.py
        continue-on-error: true

      - name: Commit updated state files
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add *.json
          git diff --staged --quiet || git commit -m "Update monitor state files"
          git push
